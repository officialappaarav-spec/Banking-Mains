<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Mains </title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        header h1 {
            font-size: 3rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #94a3b8;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            width: 320px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card:hover::before {
            opacity: 1;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.5rem;
        }

        .card h2 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }

        .card p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .card:hover .btn {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .card { width: 100%; max-width: 350px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Banking Mains</h1>
        <p>Master Your Preparation with Precision</p>
    </header>

    <div class="container">
        <div class="card" onclick="navigateTo('clerk.html')">
            <div class="icon-box">📝</div>
            <h2>Clerk Mains</h2>
            <p>Comprehensive practice sets focused on speed and accuracy for Clerical Cadre exams.</p>
            <span class="btn">Start Test</span>
        </div>

        <div class="card" onclick="navigateTo('po.html')">
            <div class="icon-box">🏆</div>
            <h2>PO Mains</h2>
            <p>High-level reasoning, data interpretation, and advanced mock tests for Probationary Officers.</p>
            <span class="btn">Start Test</span>
        </div>
    </div>

    <script>
        function navigateTo(url) {
            // Adding a small delay for the click ripple effect feel (optional)
            console.log("Redirecting to: " + url);
            window.location.href = url;
        }
    </script>

</body>
</html>
